<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f4f4; padding:20px; }
        .container { background:white; padding:30px; border-radius:10px; max-width:600px; margin:auto; }
        .header { background:#e74c3c; color:white; padding:20px; border-radius:8px; text-align:center; }
        .details { background:#f8f9fa; padding:15px; border-radius:8px; margin:20px 0; }
        .footer { text-align:center; color:#888; margin-top:20px; font-size:12px; }
        h1 { margin:0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>❌ Booking Cancelled</h1>
    </div>
    <p>Hi <strong th:text="${userName}">User</strong>,</p>
    <p>Your booking has been successfully cancelled.</p>
    <div class="details">
        <h2 th:text="${eventTitle}">Event Title</h2>
        <p>🔖 <strong>Booking Reference:</strong> <span th:text="${bookingReference}">REF</span></p>
        <p>🎟️ <strong>Tickets Cancelled:</strong> <span th:text="${numberOfTickets}">1</span></p>
        <p>💰 <strong>Amount:</strong> ₹<span th:text="${totalAmount}">0</span></p>
    </div>
    <p>We hope to see you at future events! 🙏</p>
    <div class="footer">
        <p>BookMyEvent © 2024 | This is an automated email</p>
    </div>
</div>
</body>
</html>
